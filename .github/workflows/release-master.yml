name: release-master

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    env:
      CI_ANDROID_BUILD: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      # -----------------------
      # TEST (indipendenti da MAUI)
      # -----------------------
      - name: Restore Tests
        run: dotnet restore CassaComuneAnM.Tests/CassaComuneAnM.Tests.csproj

      - name: Run Tests
        run: dotnet test CassaComuneAnM.Tests/CassaComuneAnM.Tests.csproj -c Release --no-restore

      # -----------------------
      # BUILD ANDROID (SOLO MAUI)
      # -----------------------
      - name: Restore MAUI
        run: dotnet restore CassaComuneAnM.MauiAppUi/CassaComuneAnM.MauiAppUi.csproj

      - name: Build MAUI
        run: dotnet build CassaComuneAnM.MauiAppUi/CassaComuneAnM.MauiAppUi.csproj -c Release --no-restore -p:RuntimeIdentifier=android-arm64

      - name: Publish Android APK
        run: |
          dotnet publish CassaComuneAnM.MauiAppUi/CassaComuneAnM.MauiAppUi.csproj \
            -f net8.0-android \
            -c Release \
            --no-build \
            -p:AndroidPackageFormat=apk \
            -o ./artifacts

      # -----------------------
      # ARTIFACT
      # -----------------------
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: artifacts/*.apk
          if-no-files-found: error

      # -----------------------
      # SEMANTIC RELEASE
      # -----------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
