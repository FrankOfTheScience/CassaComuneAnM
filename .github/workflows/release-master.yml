name: release-master

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Restore Android app
        run: dotnet restore CassaComuneAnM.MauiAppUi/CassaComuneAnM.MauiAppUi.csproj -f net8.0-android -p:CI_ANDROID_BUILD=true

      - name: Build Android app
        run: dotnet build CassaComuneAnM.MauiAppUi/CassaComuneAnM.MauiAppUi.csproj -f net8.0-android -c Release --no-restore -p:CI_ANDROID_BUILD=true

      - name: Test
        run: dotnet test CassaComuneAnM.Tests/CassaComuneAnM.Tests.csproj -c Release

      - name: Publish Android APK
        run: dotnet publish CassaComuneAnM.MauiAppUi/CassaComuneAnM.MauiAppUi.csproj -f net8.0-android -c Release --no-restore -p:CI_ANDROID_BUILD=true -p:AndroidPackageFormat=apk -o ./artifacts

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: artifacts/*.apk
          if-no-files-found: error

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install semantic-release dependencies
        run: npm install

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
